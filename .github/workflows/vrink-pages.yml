name: Deploy VRINK to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vrink-pages.yml"
      - "vrink-react/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vrink-react
    env:
      GITHUB_PAGES: "true"
      NEXT_PUBLIC_BASE_PATH: "/vrink"
      NEXT_PUBLIC_NAVER_MAP_CLIENT_ID: "qlsbs916op"
      NEXT_PUBLIC_STATIC_EXPORT: "true"
      NEXT_PUBLIC_SITE_URL: "https://weemiles.github.io/vrink"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vrink-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build:github-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vrink-react/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
